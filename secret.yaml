apiVersion: v1
kind: Secret
metadata:
  name: kubeops-ai-secret
  namespace: default
  labels:
    app.kubernetes.io/name: kubeops-ai
    app.kubernetes.io/part-of: kubeops-ai
type: Opaque
stringData:
  # The Gemini API Key required by the ADK Agent (obtained from https://aistudio.google.com/)
  # Replace 'your-gemini-api-key-here' with your actual API key.
  GOOGLE_API_KEY: "your-gemini-api-key-here"

  # Optional: Kubeconfig configuration.
  # Note: When running inside a pod on GKE or K3s, the Python Kubernetes client
  # automatically uses the pod's in-cluster ServiceAccount token, so you typically
  # do NOT need to supply a KUBECONFIG secret.
  # If you do need a custom kubeconfig, you can mount it from a secret or configmap.
